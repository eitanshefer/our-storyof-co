<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Laura & Josh — The Film</title>
<meta property="og:title" content="Laura & Josh — The Film">
<meta property="og:description" content="Ten Years of Choosing Each Other">
<meta property="og:image" content="/assets/film-poster.jpg">
<meta property="og:type" content="video.other">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --gold: #C8A45C;
    --warm-bg: #2C2418;
    --cream: #F5E6C8;
    --text-dim: #B8A88A;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: 'Inter', sans-serif;
    background: var(--warm-bg);
    color: var(--cream);
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 2rem;
  }
  h1 {
    font-family: 'DM Serif Display', serif;
    font-size: clamp(1.5rem, 4vw, 2.2rem);
    margin-bottom: 0.3rem;
  }
  .subtitle {
    color: var(--text-dim);
    font-size: 0.9rem;
    margin-bottom: 1.5rem;
    letter-spacing: 1px;
  }
  .film-wrap {
    position: relative;
    width: 90%;
    max-width: 900px;
    aspect-ratio: 16 / 9;
    border-radius: 8px;
    overflow: hidden;
    background: url('/assets/film-poster.jpg') center/cover no-repeat;
  }
  video {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: cover;
  }
  .back-link {
    margin-top: 2rem;
    color: var(--text-dim);
    text-decoration: none;
    font-size: 0.85rem;
    letter-spacing: 1px;
    transition: color 0.3s;
  }
  .back-link:hover { color: var(--gold); }
</style>
</head>
<body>
  <h1>Laura & Josh</h1>
  <p class="subtitle">Ten Years of Choosing Each Other</p>
  <div class="film-wrap">
    <video controls playsinline preload="metadata" poster="/assets/film-poster.jpg">
      <source src="https://media.storyof.co/LauraAndJosh/film.mp4" type="video/mp4">
    </video>
  </div>
  <a href="/LauraAndJosh/" class="back-link">View the full story &rarr;</a>
</body>
</html>
